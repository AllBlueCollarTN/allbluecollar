<section class="quote-section" id="quote">
  <div class="quote-container">
    <h2>REQUEST A FREE QUOTE</h2>
    <p>
      Tell us about your project. We provide free estimates and will contact
      you as soon as possible.
    </p>

    <form
      class="quote-form"
      action="https://formsubmit.co/quote@allbluecollar.com"
      method="POST"
      enctype="multipart/form-data"
    >
      <!-- FormSubmit settings -->
      <input
        type="hidden"
        name="_subject"
        value="New Free Estimate Request — A Blue Collar Property Service"
      />
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_template" value="table" />

      <div class="form-grid">
        <div class="form-group">
          <label for="name">Name *</label>
          <input
            type="text"
            id="name"
            name="Name"
            placeholder="Your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number *</label>
          <input
            type="tel"
            id="phone"
            name="Phone Number"
            placeholder="(555) 555-5555"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input
            type="email"
            id="email"
            name="Email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="address">Property Address *</label>
          <input
            type="text"
            id="address"
            name="Property Address"
            placeholder="Street, city and ZIP code"
            required
          />
        </div>

        <div class="form-group full-width">
          <label for="service">Service Needed *</label>
          <select id="service" name="Service Needed" required>
            <option value="">Choose a service</option>
            <option>Pressure Washing</option>
            <option>Excavation</option>
            <option>Land Clearing</option>
            <option>Grading</option>
            <option>Gravel Driveways</option>
            <option>Driveway Repair</option>
            <option>Brush Removal</option>
            <option>Storm Cleanup</option>
            <option>Debris Removal</option>
            <option>Property Cleanup</option>
            <option>Drainage Work</option>
            <option>Trenching</option>
            <option>Demolition</option>
            <option>Hauling</option>
            <option>Other Property Service</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="description">Description of Project *</label>
          <textarea
            id="description"
            name="Project Description"
            rows="6"
            placeholder="Describe the work you need, the approximate size of the area and any special concerns."
            required
          ></textarea>
        </div>

        <div class="form-group full-width">
          <label for="photos">Upload Photos — Optional</label>
          <input
            type="file"
            id="photos"
            name="Project Photos"
            accept="image/*"
            multiple
          />
          <small>Photos can help us provide a more accurate estimate.</small>
        </div>

        <div class="form-group">
          <label for="contact-method">Preferred Contact Method *</label>
          <select
            id="contact-method"
            name="Preferred Contact Method"
            required
          >
            <option value="">Choose one</option>
            <option>Phone Call</option>
            <option>Text Message</option>
            <option>Email</option>
          </select>
        </div>

        <div class="form-group">
          <label for="contact-time">Best Time to Contact</label>
          <select id="contact-time" name="Best Time to Contact">
            <option value="">Choose a time</option>
            <option>Morning</option>
            <option>Afternoon</option>
            <option>Evening</option>
            <option>Anytime</option>
          </select>
        </div>
      </div>

      <button type="submit" class="quote-button">
        Get My Free Estimate
      </button>

      <p class="privacy-note">
        Your information will only be used to respond to your estimate request.
      </p>
    </form>
  </div>
</section>
